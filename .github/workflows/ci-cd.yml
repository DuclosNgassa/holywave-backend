name: Docker Build -> Push -> Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: holywave

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set image name
        id: vars
        run: echo "holywave-app:${{ steps.vars.outputs.SHORT_SHA }}" >> $GITHUB_OUTPUT

      - name: Use image name
        run: echo "Image is ${{ steps.vars.outputs.image_name }}"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin' # See 'Supported distributions' for available options
          java-version: '21'

      - name: Build jar
        run: ./mvnw clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: docker build -t ${{vars.DOCKERHUB_USERNAME}}/${{ steps.vars.outputs.image_name }} .

      - name: Push Image
        run: docker push ${{vars.DOCKERHUB_USERNAME}}/${{ steps.vars.outputs.image_name }}

      - name: SSH and Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{vars.EC2_USER}}
          key: ${{secrets.EC2_SSH_KEY}}
          script: |
            docker stop holywave-app || true
            docker rm holywave-app || true
            docker pull ${{vars.DOCKERHUB_USERNAME}}/${{ steps.vars.outputs.image_name }}
            docker run -d --name holywave-app -p 8080:8080  ${{vars.DOCKERHUB_USERNAME}}/${{ steps.vars.outputs.image_name }} 
